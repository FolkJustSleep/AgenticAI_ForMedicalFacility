services:
  ollama:
    container_name: medllama_ollama
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ../../.ollama:/root/.ollama
    restart: unless-stopped
  postgres:
    container_name: agenticai_postgres
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agenticai_db
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persist database data
    restart: unless-stopped
  
  pgAdmin:
    container_name: agenticai_pgadmin
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@agenticai.com
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - "8080:80"
    depends_on:
      - postgres
    restart: unless-stopped
  agenticai_app:
    container_name: agenticai_app
    depends_on:
      - ollama
      - postgres
    build: .
    ports:
      - "8000:8000"
    # volumes:
    #   - ./data/chroma_db:/app/data/chroma_db
    env_file:
      - ./.env
    restart: unless-stopped
volumes:
  postgres_data: